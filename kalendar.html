<html>
  <head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css?family=Cinzel:400,700,900|Open+Sans:400,700" rel="stylesheet"> 
    <link rel="stylesheet" type="text/css" href="kalendar.css">
  </head>
  <body>
    <table id="kalendar"></table>
  </body>
  <script src="kalendar_data.js"></script>
  <script type="module" src="kalendar.js"></script>
  <script type="module" src="kalendar_view.js"></script>
  <script src="js/jquery-2.2.4.min.js"></script>
  <script>
    var d = new Date();    
  </script>
  <script type="module">
    import Kalendar from './kalendar.js';
    import updateKalendar from './kalendar_view.js';
    import {addDays} from './date_calcs.js';
    window.addDays = addDays;
    window.Kalendar = Kalendar;
    window.updateKalendar = updateKalendar;
    var k = new window.Kalendar(d.getFullYear()); 
    window.k = k;
    window.updateKalendar(d, window.k); 
  </script>
</html>
